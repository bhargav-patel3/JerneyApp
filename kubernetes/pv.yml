apiVersion: v1
kind: PersistentVolume
metadata:
  name: jerney-pv
  namespace: jerney-namespace
spec:
  capacity:
    storage: 2Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /mnt/jerney-data
    type: DirectoryOrCreate
