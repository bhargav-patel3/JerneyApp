
name: Deploy to EKS
 
on:
  push:
    branches:
      - main
 
env:
  IMAGE_NAME: "jerney-"
  TAG: ${{ github.run_number }}
 
jobs:
  deploy:
    runs-on: ubuntu-latest
 
    steps:
 
      # --------------------------------------------------
      # Stage 1: Checkout code
      # --------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v3
 
      # --------------------------------------------------
      # NEW: Setup Docker Buildx
      # Enables advanced build features — required for layer caching
      # Without this, cache-from/cache-to in build-push won't work
      # Marketplace: https://github.com/marketplace/actions/docker-setup-buildx
      # --------------------------------------------------
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      # --------------------------------------------------
      # Stage 2 & 3: Docker login
      # --------------------------------------------------
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}
 
      # --------------------------------------------------
      # Docker build + push frontend
      # NEW: cache-from and cache-to added
      # type=gha means GitHub Actions cache storage
      # First run: builds normally and saves cache
      # Next runs: reuses unchanged layers — much faster
      # --------------------------------------------------
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: bunny9988/${{ env.IMAGE_NAME }}frontend:${{ env.TAG }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
 
      # --------------------------------------------------
      # Docker build + push backend
      # scope=backend keeps frontend and backend cache separate
      # --------------------------------------------------
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: bunny9988/${{ env.IMAGE_NAME }}backend:${{ env.TAG }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
 
      # --------------------------------------------------
      # Stage 4: Update image tag in manifests
      # --------------------------------------------------
      - name: Update k8s image tag
        run: |
          sed -i "s|jerney-backend:.*|jerney-backend:${{ env.TAG }}|g" kubernetes/backend-deployment.yml
          sed -i "s|jerney-frontend:.*|jerney-frontend:${{ env.TAG }}|g" kubernetes/frontend-deployment.yml
          cat kubernetes/backend-deployment.yml
          cat kubernetes/frontend-deployment.yml
 
      # --------------------------------------------------
      # NEW: Upload updated manifests as artifact
      # Saves the sed-modified YAML files so you can download
      # and inspect them from the Actions run page if something fails
      # Marketplace: https://github.com/marketplace/actions/upload-a-build-artifact
      # --------------------------------------------------
      - name: Save updated manifests
        uses: actions/upload-artifact@v3
        with:
          name: k8s-manifests-build-${{ env.TAG }}
          path: kubernetes/
 
      # --------------------------------------------------
      # AWS credentials setup
      # --------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
 
      # --------------------------------------------------
      # Install kubectl and setup kubeconfig
      # --------------------------------------------------
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
 
      - name: Setup kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name jernerApp-cluster
 
      # --------------------------------------------------
      # Stage 5: Deploy to EKS
      # --------------------------------------------------
      - name: Deploy to EKS
        run: |
          kubectl apply -f kubernetes/namespace.yml
          kubectl apply -f kubernetes/storageclass.yml
          kubectl apply -f kubernetes/pvc.yml
          kubectl apply -f kubernetes/secret.yml
          kubectl apply -f kubernetes/db-deployment.yml
          kubectl apply -f kubernetes/db-service.yml
          kubectl apply -f kubernetes/backend-deployment.yml
          kubectl apply -f kubernetes/frontend-deployment.yml
          kubectl apply -f kubernetes/backend-service.yml
          kubectl apply -f kubernetes/frontend-service.yml
          kubectl apply -f kubernetes/ingress.yml
          kubectl get all -n jerney-namespace
 
      # --------------------------------------------------
      # Stage 6: Verify rollout
      # --------------------------------------------------
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/jerney-backend -n jerney-namespace --timeout=120s
          kubectl rollout status deployment/jerney-frontend -n jerney-namespace --timeout=120s
 