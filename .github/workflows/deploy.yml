Name: Deploy to EKS with EBS

on:
    push:
        branches: [ main ]

env:
    IMAGE_NAME: "jerney-"
    TAG: ${{ github.run_number }}

jobs:
    deploy:
        runs-on: ubuntu-latest  
        steps:
            - name: Checkout code
                uses: actions/checkout@v3
            - name: Setup Docker Buildx
                uses: docker/setup-buildx-action@v3
            - name: Docker login
                uses: docker/login-action@v3
                with:
                    username: ${{ secrets.DOCKER_USER }}
                    password: ${{ secrets.DOCKER_PASS }}
            - name: Build and push frontend
                uses: docker/build-push-action@v5
                with:
                    context: ./frontend
                    push: true  
                    tags: bunny9988/${{ env.IMAGE_NAME }}frontend:${{ env.TAG }}
                    cache-from: type=gha,scope=frontend
                    cache-to: type=gha,scope=frontend,mode=max  
            - name: Build and push backend
                uses: docker/build-push-action@v5
                with:
                    context: ./backend
                    push: true  
                    tags: bunny9988/${{ env.IMAGE_NAME }}backend:${{ env.TAG }}
                    cache-from: type=gha,scope=backend
                    cache-to: type=gha,scope=backend,mode=max   
            - name: Configure AWS credentials
                uses: aws-actions/configure-aws-credentials@v2
                with:
                    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                    aws-region: us-east-1   
            - name: Update Kubernetes manifests
                run: |
                    sed -i "s|IMAGE_TAG|${{ env.TAG }}|g" kubernetes/backend-deployment.yml
            - name: Install kubectl
                uses: azure/setup-kubectl@v3
                with:
                    version: 'latest'
            - name: Setup kubeconfig
                run: aws eks update-kubeconfig --region us-east-1 --name jernerApp-cluster
            - name: Deploy to EKS
                run: |
                    kubectl apply -f kubernetes/